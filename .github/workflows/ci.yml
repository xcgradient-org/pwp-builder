name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'pwp-builder/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'pwp-builder/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwp-builder
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: pwp-builder/package-lock.json
      - name: Install dependencies
        run: npm ci
      # Skip tests if none are defined in package.json
      - name: Run tests
        run: npm test || echo "No tests defined"

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: pwp-builder
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pwp-builder:latest
